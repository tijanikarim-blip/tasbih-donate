name: Build & Release APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41'
          channel: 'stable'

      - name: Generate images
        run: |
          curl -s "https://image.pollinations.ai/prompt/Islamic%20prayer%20beads%20tasbih%20gold%20emerald%20green%20dark%20background%20mosque%20silhouette%20app%20background" -o assets/images/app_bg.png
          curl -s "https://image.pollinations.ai/prompt/سبح%20وتبرع%20Tasbih%20Donate%20app%20logo%20gold%20crescent%20moon%20prayer%20beads%20Islamic%20typography" -o assets/images/logo.png

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
