name: Build & Release APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41'
          channel: 'stable'

      - name: Generate images
        run: |
          curl -s "https://image.pollinations.ai/prompt/Luxury%20Islamic%20mobile%20app%20splash%20screen%20background%20deep%20dark%20emerald%20green%20gradient%20golden%20tasbih%20prayer%20beads%20mosque%20silhouette%20Arabic%20calligraphy%20سبح%20وتبرع%20glowing%20gold%20premium%20cinematic%20lighting?width=1080&height=1920&seed=42&model=flux" -o assets/images/splash_bg.png
          curl -s "https://image.pollinations.ai/prompt/Premium%20Islamic%20mobile%20app%20icon%20golden%20crescent%20moon%20tasbih%20prayer%20beads%20Arabic%20calligraphy%20سبح%20وتبرع%20deep%20emerald%20green%20luxurious%20gold%20metallic%20vector?width=1024&height=1024&seed=123&model=flux" -o assets/images/icon.png
          curl -s "https://image.pollinations.ai/prompt/Elegant%20Islamic%20charity%20donation%20illustration%20glowing%20donation%20box%20golden%20coins%20helping%20hands%20mosque%20silhouette%20emerald%20green%20gold%20flat%20vector?width=1024&height=1024&seed=777&model=flux" -o assets/images/donation.png

      - name: Generate video
        run: |
          curl -s -X POST https://api.free.ai/v1/video/generate/ \
            -H "Authorization: Bearer ${{ secrets.FREEAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"prompt":"Golden Islamic tasbih prayer beads glowing on dark emerald background, holy light rays, cinematic slow motion, spiritual atmosphere","duration":4,"aspect_ratio":"16:9","model":"cogvideox"}' \
            -o video_response.json
          python -c "import json; d=json.load(open('video_response.json')); print(d.get('video_url',''))" > video_url.txt

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
